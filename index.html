<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tecnobase</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial; }

body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
}

nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

nav button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #fcfcfc;
}

section {
    display: none;
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 10px;
}

.active { display: block; }

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.salvar { background: #00ff88; }

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
    color: black;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
}

.baixo { background: #ffcccc; }
</style>

<script>
const API = "http://localhost:3000";

// TROCAR TELA
function trocarTela(tela) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(tela).classList.add("active");
}

// CLIENTES
async function atualizarClientes(){
    try {
        let res = await fetch(API + "/clientes");
        let dados = await res.json();

        let tabela = document.getElementById("tabelaClientes");
        tabela.innerHTML = "";

        dados.forEach(c => {
            tabela.innerHTML += `
            <tr>
                <td>${c.id_cliente}</td>
                <td>${c.nome}</td>
            </tr>`;
        });
    } catch (err) {
        console.log("Erro clientes:", err);
    }
}

// PRODUTOS
async function atualizarProdutos(){
    try {
        let res = await fetch(API + "/produtos");
        let dados = await res.json();

        let tabela = document.getElementById("tabelaProdutos");
        tabela.innerHTML = "";

        dados.forEach(p => {
            let baixo = p.quantidade <= p.estoque_minimo;

            tabela.innerHTML += `
            <tr class="${baixo ? 'baixo':''}">
                <td>${p.id_produto}</td>
                <td>${p.nome}</td>
                <td>${p.quantidade}</td>
                <td>${p.estoque_minimo}</td>
                <td>${baixo ? '⚠ Baixo' : 'OK'}</td>
            </tr>`;
        });
    } catch (err) {
        console.log("Erro produtos:", err);
    }
}

// SELECTS
async function carregarSelects(){
    try {
        let clientes = await fetch(API + "/clientes").then(r => r.json());
        let produtos = await fetch(API + "/produtos").then(r => r.json());

        let sc = document.getElementById("selectCliente");
        let sp = document.getElementById("selectProduto");

        sc.innerHTML = '<option value="">Cliente</option>';
        sp.innerHTML = '<option value="">Produto</option>';

        clientes.forEach(c => {
            sc.innerHTML += `<option value="${c.id_cliente}">${c.nome}</option>`;
        });

        produtos.forEach(p => {
            sp.innerHTML += `<option value="${p.id_produto}">${p.nome}</option>`;
        });

    } catch (err) {
        console.log("Erro selects:", err);
    }
}

// VENDA
async function realizarVenda(e){
    e.preventDefault();

    const id_cliente = document.getElementById("selectCliente").value;
    const id_produto = document.getElementById("selectProduto").value;
    const quantidade = document.getElementById("qtdVenda").value;

    if(!id_cliente || !id_produto || !quantidade){
        alert("Preencha tudo!");
        return;
    }

    try {
        let res = await fetch(API + "/venda", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id_cliente, id_produto, quantidade })
        });

        let msg = await res.text();
        alert(msg);

        atualizarProdutos();
        atualizarVendas();

    } catch (err) {
        console.log("Erro venda:", err);
    }
}

// VENDAS
async function atualizarVendas(){
    try {
        let res = await fetch(API + "/vendas");
        let dados = await res.json();

        let tabela = document.getElementById("tabelaVendas");
        tabela.innerHTML = "";

        dados.forEach(v => {
            tabela.innerHTML += `
            <tr>
                <td>${v.id_pedido}</td>
                <td>${v.produto}</td>
                <td>${v.cliente}</td>
                <td>${v.quantidade}</td>
            </tr>`;
        });
    } catch (err) {
        console.log("Erro vendas:", err);
    }
}

// LOAD
window.onload = () => {
    atualizarClientes();
    atualizarProdutos();
    atualizarVendas();
    carregarSelects();
};
</script>

</head>

<body>

<header>
    <h1>Sistema Tecnobase</h1>
    <h2>Controle de Estoque</h2>
</header>

<nav>
<button onclick="trocarTela('clientes')">Clientes</button>
<button onclick="trocarTela('produtos')">Produtos</button>
<button onclick="trocarTela('vendas')">Vendas</button>
</nav>

<section id="clientes" class="active">
<h2>Clientes</h2>

<table>
<thead>
<tr><th>ID</th><th>Nome</th></tr>
</thead>
<tbody id="tabelaClientes"></tbody>
</table>
</section>

<section id="produtos">
<h2>Produtos</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Produto</th>
<th>Qtd</th>
<th>Estoque mínimo</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabelaProdutos"></tbody>
</table>
</section>

<section id="vendas">
<h2>Vendas</h2>

<form onsubmit="realizarVenda(event)">
<select id="selectCliente"></select>
<select id="selectProduto"></select>
<input type="number" id="qtdVenda" placeholder="Quantidade">
<button class="salvar">Registrar</button>
</form>

<table>
<thead>
<tr>
<th>ID</th>
<th>Produto</th>
<th>Cliente</th>
<th>Quantidade</th>
</tr>
</thead>
<tbody id="tabelaVendas"></tbody>
</table>

</section>

</body>
</html>
