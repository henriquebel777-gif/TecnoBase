<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - TecnoBase</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body {
    background: linear-gradient(135deg, #1e3c72, #2a5298, #3b82f6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

h2 {
    margin: 15px 0 10px;
    font-size: 18px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #00ff88;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 10px;
}

button:hover {
    background: #00cc6a;
}

.divisor {
    text-align: center;
    margin: 15px 0;
    opacity: 0.7;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>TecnoBase</h1>

    <!-- LOGIN -->
    <h2>Login</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginSenha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    <div class="divisor">ou</div>

    <!-- CADASTRO -->
    <h2>Cadastro</h2>
    <form id="cadastroForm">
        <input type="text" id="cadNome" placeholder="Nome" required>
        <input type="email" id="cadEmail" placeholder="Email" required>
        <input type="password" id="cadSenha" placeholder="Senha" required>
        <button type="submit">Cadastrar</button>
    </form>
</div>

<script src="login.js"></script>

</body>
</html>
